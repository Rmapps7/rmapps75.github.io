<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#fafaf7;--dark:#18181f;--gold:#b8892e;--gold2:#d4a84c;
    --text:#18181f;--muted:#7a7068;--card:#ffffff;--border:rgba(184,137,46,0.18);
    --player-h:80px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;padding-bottom:calc(var(--player-h) + 1rem);}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.3rem 3rem;background:rgba(250,250,247,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
  .logo{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;color:var(--dark);letter-spacing:0.03em;text-decoration:none;}
  .logo span{color:var(--gold);}
  .nav-right{display:flex;align-items:center;gap:2rem;}
  .nav-link{color:var(--muted);text-decoration:none;font-size:0.82rem;letter-spacing:0.08em;text-transform:uppercase;transition:color 0.25s;}
  .nav-link:hover{color:var(--gold);}

  .page-header{padding:8rem 3rem 3rem;text-align:center;background:var(--bg);position:relative;overflow:hidden;}
  .page-header::after{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(184,137,46,0.08) 0%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;}
  .eyebrow{font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;justify-content:center;gap:0.75rem;}
  .eyebrow::before{content:'';display:inline-block;width:28px;height:1px;background:var(--gold);}
  .page-header h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,4rem);font-weight:900;line-height:1.08;color:var(--dark);margin-bottom:1rem;position:relative;z-index:1;}
  .page-header h1 em{font-style:italic;color:var(--gold);}
  .page-header p{color:var(--muted);font-size:1rem;max-width:480px;margin:0 auto;line-height:1.75;position:relative;z-index:1;}

  .filters-bar{position:sticky;top:72px;z-index:90;background:rgba(250,250,247,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0.9rem 3rem;}
  .filters-inner{max-width:1160px;margin:0 auto;display:flex;gap:0.6rem;align-items:center;flex-wrap:wrap;}
  .filter-label{font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-right:0.2rem;}
  .filter-sep{width:1px;height:20px;background:var(--border);margin:0 0.4rem;}
  .filter-chip{padding:0.38rem 1rem;border-radius:20px;font-size:0.78rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.22s;letter-spacing:0.04em;font-family:'DM Sans',sans-serif;font-weight:400;}
  .filter-chip:hover{border-color:var(--gold);color:var(--gold);}
  .filter-chip.active{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:500;}
  .search-wrap{margin-left:auto;display:flex;align-items:center;gap:0.5rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.9rem;}
  .search-wrap input{border:none;background:none;outline:none;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--text);width:180px;}
  .search-wrap input::placeholder{color:var(--muted);}

  .stations-section{max-width:1160px;margin:2rem auto 0;padding:0 3rem 4rem;}
  .country-block{margin-bottom:3rem;}
  .country-heading{display:flex;align-items:center;gap:1rem;margin-bottom:1.4rem;padding-bottom:0.9rem;border-bottom:1px solid var(--border);}
  .country-flag{font-size:1.8rem;}
  .country-name{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--dark);}
  .country-count{font-size:0.78rem;color:var(--muted);margin-left:auto;}

  .stations-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1rem;}
  .station-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:1.4rem 1.2rem;display:flex;flex-direction:column;gap:0.7rem;cursor:pointer;transition:all 0.28s;outline:none;}
  .station-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 12px 32px rgba(184,137,46,0.1);}
  .station-card.playing{border-color:var(--gold);background:rgba(184,137,46,0.04);box-shadow:0 0 0 3px rgba(184,137,46,0.15);}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;}
  .station-name{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:var(--dark);line-height:1.2;}
  .play-btn{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.22s;color:#fff;font-size:0.8rem;}
  .play-btn:hover{background:var(--gold2);transform:scale(1.08);}
  .station-card.playing .play-btn{background:var(--dark);}
  .station-tags{display:flex;flex-wrap:wrap;gap:0.4rem;}
  .tag{display:inline-flex;align-items:center;background:rgba(184,137,46,0.08);border:1px solid rgba(184,137,46,0.2);color:var(--gold);padding:0.22rem 0.65rem;border-radius:20px;font-size:0.68rem;letter-spacing:0.05em;text-transform:uppercase;font-weight:500;}
  .tag.pub{background:rgba(24,24,31,0.05);border-color:rgba(24,24,31,0.12);color:var(--muted);}
  .tag.auth{background:rgba(67,122,34,0.08);border-color:rgba(67,122,34,0.25);color:#437a22;}

  .eq{display:inline-flex;align-items:flex-end;gap:2px;height:14px;}
  .eq span{display:inline-block;width:3px;background:var(--gold2);border-radius:2px;animation:eq 0.9s ease-in-out infinite alternate;}
  .eq span:nth-child(1){height:40%;animation-delay:0s;}
  .eq span:nth-child(2){height:80%;animation-delay:0.15s;}
  .eq span:nth-child(3){height:55%;animation-delay:0.3s;}
  .eq span:nth-child(4){height:90%;animation-delay:0.08s;}
  @keyframes eq{from{transform:scaleY(0.4)}to{transform:scaleY(1)}}

  .empty{text-align:center;padding:5rem 2rem;color:var(--muted);}

  .sticky-player{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--player-h);background:var(--dark);border-top:1px solid rgba(184,137,46,0.3);display:flex;align-items:center;gap:1.5rem;padding:0 3rem;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);}
  .sticky-player.visible{transform:translateY(0);}
  .player-info{display:flex;flex-direction:column;gap:0.2rem;min-width:0;flex:1;}
  .player-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .player-sub{font-size:0.75rem;color:rgba(255,255,255,0.45);}
  .player-controls{display:flex;align-items:center;gap:1rem;}
  .p-play{width:46px;height:46px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;transition:all 0.22s;}
  .p-play:hover{background:var(--gold2);}
  .p-stop{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.6);font-size:0.75rem;transition:all 0.22s;}
  .p-stop:hover{background:rgba(255,255,255,0.15);color:#fff;}
  .p-vol{display:flex;align-items:center;gap:0.75rem;}
  .p-vol-lbl{color:rgba(255,255,255,0.4);font-size:0.85rem;}
  .vol-slider{-webkit-appearance:none;appearance:none;width:90px;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;outline:none;cursor:pointer;}
  .vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;}
  .live-ind{display:flex;align-items:center;gap:0.6rem;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:#e74c3c;animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
  .live-lbl{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);}

  .page-footer{background:var(--dark);color:rgba(255,255,255,0.4);padding:2rem 3rem;text-align:center;font-size:0.8rem;}
  .page-footer a{color:var(--gold2);text-decoration:none;}

  @media(max-width:768px){
    nav{padding:1rem 1.5rem;}
    .nav-link{display:none;}
    .page-header{padding:6rem 1.5rem 2rem;}
    .filters-bar{padding:0.8rem 1.5rem;top:64px;}
    .filters-inner{gap:0.4rem;}
    .search-wrap{margin-left:0;width:100%;}
    .search-wrap input{width:100%;}
    .stations-section{padding:1.5rem 1.5rem 4rem;}
    .sticky-player{padding:0 1.5rem;gap:1rem;}
    .p-vol{display:none;}
  }
  @media(max-width:480px){.stations-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>

  return '<div class="eq"><span></span><span></span><span></span><span></span></div>';
}

function makeTags(s) {
  var t = "";
  if (s.pub) t += '<span class="tag pub">Public</span>';
  if (s.auth) t += '<span class="tag auth">Authorized</span>';
  t += '<span class="tag">' + s.g + '</span>';
  return t;
}

function render() {
  var container = document.getElementById("stations-container");
  container.innerHTML = "";
  var total = 0;

  for (var ci = 0; ci < ORDER.length; ci++) {
    var code = ORDER[ci];
    if (selCountry !== "all" && selCountry !== code) continue;
    var grp = STATIONS[code];

    var filtered = [];
    for (var i = 0; i < grp.list.length; i++) {
      var s = grp.list[i];
      if (selGenre !== "all") {
        if (s.g !== selGenre) continue;
      }
      if (searchQ && s.n.toLowerCase().indexOf(searchQ) === -1) continue;
      filtered.push(s);
    }
    if (!filtered.length) continue;
    total += filtered.length;

    var block = document.createElement("div");
    block.className = "country-block";

    var heading = document.createElement("div");
    heading.className = "country-heading";
    heading.innerHTML = '<span class="country-flag">' + grp.flag + '</span>' +
      '<span class="country-name">' + grp.name + '</span>' +
      '<span class="country-count">' + filtered.length + ' station' + (filtered.length > 1 ? 's' : '') + '</span>';
    block.appendChild(heading);

    var grid = document.createElement("div");
    grid.className = "stations-grid";

    for (var j = 0; j < filtered.length; j++) {
      (function(station, countryName, countryFlag) {
        var card = document.createElement("div");
        card.className = "station-card";
        card.setAttribute("tabindex", "0");
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", "Play " + station.n);
        card.innerHTML = '<div class="card-top">' +
          '<div class="station-name">' + station.n + '</div>' +
          '<button class="play-btn" aria-label="Play">&#9654;</button>' +
          '</div>' +
          '<div class="station-tags">' + makeTags(station) + '</div>';

        var playBtn = card.querySelector(".play-btn");

        function activate() {
          if (activeCard && activeCard !== card) {
            activeCard.classList.remove("playing");
            var prevBtn = activeCard.querySelector(".play-btn");
            if (prevBtn) prevBtn.innerHTML = "&#9654;";
          }
          activeCard = card;
          card.classList.add("playing");
          playBtn.innerHTML = makeEQ();
          audio.src = station.url;
          audio.play().catch(function() {});
          playing = true;
          document.getElementById("p-name").textContent = station.n;
          document.getElementById("p-sub").textContent = countryFlag + " " + countryName;
          stickyPlayer.classList.add("visible");
          var pp = document.getElementById("p-play");
          pp.innerHTML = "&#9646;&#9646;";
        }

        function toggle() {
          if (activeCard === card && playing) {
            audio.pause();
            playing = false;
            playBtn.innerHTML = "&#9654;";
            document.getElementById("p-play").innerHTML = "&#9654;";
          } else {
            activate();
          }
        }

        card.addEventListener("click", toggle);
        card.addEventListener("keydown", function(e) {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); }
        });
        playBtn.addEventListener("click", function(e) { e.stopPropagation(); toggle(); });
        grid.appendChild(card);
      })(filtered[j], grp.name, grp.flag);
    }

    block.appendChild(grid);
    container.appendChild(block);
  }

  if (!total) {
    container.innerHTML = '<div class="empty"><p>No stations match your filters.</p></div>';
  }
}

document.querySelectorAll(".filter-chip").forEach(function(btn) {
  btn.addEventListener("click", function() {
    var type = btn.getAttribute("data-type");
    var val = btn.getAttribute("data-val");
    document.querySelectorAll('.filter-chip[data-type="' + type + '"]').forEach(function(b) {
      b.classList.remove("active");
    });
    btn.classList.add("active");
    if (type === "country") selCountry = val;
    if (type === "genre") selGenre = val;
    render();
  });
});

document.getElementById("search-input").addEventListener("input", function(e) {
  searchQ = e.target.value.toLowerCase().trim();
  render();
});

document.getElementById("p-play").addEventListener("click", function() {
  var pp = document.getElementById("p-play");
  if (playing) {
    audio.pause();
    playing = false;
    pp.innerHTML = "&#9654;";
    if (activeCard) activeCard.querySelector(".play-btn").innerHTML = "&#9654;";
  } else if (audio.src) {
    audio.play().catch(function() {});
    playing = true;
    pp.innerHTML = "&#9646;&#9646;";
    if (activeCard) activeCard.querySelector(".play-btn").innerHTML = makeEQ();
  }
});

document.getElementById("p-stop").addEventListener("click", function() {
  audio.pause();
  audio.src = "";
  playing = false;
  stickyPlayer.classList.remove("visible");
  if (activeCard) {
    activeCard.classList.remove("playing");
    activeCard.querySelector(".play-btn").innerHTML = "&#9654;";
    activeCard = null;
  }
});

document.getElementById("vol-slider").addEventListener("input", function(e) {
  audio.volume = e.target.value;
});

render();
</script>
</body>
</html>
