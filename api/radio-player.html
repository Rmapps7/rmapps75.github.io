<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RM Radio — Live Player</title>
<meta name="description" content="Listen to radio stations from France, Japan, Switzerland and Germany. Free, live streaming.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #fafaf7;
    --bg2:    #f3f1eb;
    --dark:   #18181f;
    --gold:   #b8892e;
    --gold2:  #d4a84c;
    --text:   #18181f;
    --muted:  #7a7068;
    --card:   #ffffff;
    --border: rgba(184,137,46,0.18);
    --shadow: 0 2px 24px rgba(24,24,31,0.07);
    --player-h: 80px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-weight:300;
    overflow-x:hidden;
    padding-bottom:calc(var(--player-h) + 1rem);
  }

  /* NAV */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:1.3rem 3rem;
    background:rgba(250,250,247,0.92);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .logo { font-family:'Playfair Display',serif; font-size:1.45rem; font-weight:700; color:var(--dark); letter-spacing:0.03em; text-decoration:none; }
  .logo span { color:var(--gold); }
  .nav-right { display:flex; align-items:center; gap:2rem; }
  .nav-link { color:var(--muted); text-decoration:none; font-size:0.82rem; letter-spacing:0.08em; text-transform:uppercase; transition:color 0.25s; }
  .nav-link:hover { color:var(--gold); }

  /* HEADER */
  .page-header {
    padding:8rem 3rem 3rem;
    text-align:center;
    background:var(--bg);
    position:relative;
    overflow:hidden;
  }
  .page-header::after {
    content:''; position:absolute;
    width:600px; height:600px; border-radius:50%;
    background:radial-gradient(circle, rgba(184,137,46,0.08) 0%, transparent 70%);
    top:-200px; left:50%; transform:translateX(-50%);
    pointer-events:none;
  }
  .eyebrow {
    font-size:0.72rem; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--gold); margin-bottom:1.2rem;
    display:flex; align-items:center; justify-content:center; gap:0.75rem;
  }
  .eyebrow::before { content:''; display:inline-block; width:28px; height:1px; background:var(--gold); }
  .page-header h1 {
    font-family:'Playfair Display',serif;
    font-size:clamp(2.2rem,5vw,4rem);
    font-weight:900; line-height:1.08;
    color:var(--dark); margin-bottom:1rem; position:relative; z-index:1;
  }
  .page-header h1 em { font-style:italic; color:var(--gold); }
  .page-header p { color:var(--muted); font-size:1rem; max-width:480px; margin:0 auto; line-height:1.75; position:relative; z-index:1; }

  /* FILTERS */
  .filters-bar {
    position:sticky; top:72px; z-index:90;
    background:rgba(250,250,247,0.95); backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    padding:0.9rem 3rem;
  }
  .filters-inner { max-width:1160px; margin:0 auto; display:flex; gap:1.2rem; align-items:center; flex-wrap:wrap; }
  .filter-group { display:flex; gap:0.5rem; align-items:center; }
  .filter-label { font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-right:0.2rem; }
  .filter-chip {
    padding:0.38rem 1rem; border-radius:20px; font-size:0.78rem;
    border:1px solid var(--border); background:transparent; color:var(--muted);
    cursor:pointer; transition:all 0.22s; letter-spacing:0.04em;
    font-family:'DM Sans',sans-serif; font-weight:400;
  }
  .filter-chip:hover { border-color:var(--gold); color:var(--gold); }
  .filter-chip.active { background:var(--gold); border-color:var(--gold); color:#fff; font-weight:500; }
  .search-box {
    margin-left:auto;
    display:flex; align-items:center; gap:0.5rem;
    background:var(--card); border:1px solid var(--border);
    border-radius:8px; padding:0.4rem 0.9rem;
  }
  .search-box input {
    border:none; background:none; outline:none;
    font-family:'DM Sans',sans-serif; font-size:0.85rem;
    color:var(--text); width:180px;
  }
  .search-box input::placeholder { color:var(--muted); }
  .search-icon { color:var(--muted); font-size:0.9rem; }

  /* STATS */
  .stats-bar { max-width:1160px; margin:2rem auto 0; padding:0 3rem; display:flex; gap:2.5rem; }
  .stat { display:flex; flex-direction:column; gap:0.15rem; }
  .stat-val { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; color:var(--dark); }
  .stat-lbl { font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }

  /* GRID */
  .stations-section { max-width:1160px; margin:0 auto; padding:2rem 3rem 4rem; }
  .country-block { margin-bottom:3rem; }
  .country-heading {
    display:flex; align-items:center; gap:1rem;
    margin-bottom:1.4rem; padding-bottom:0.9rem;
    border-bottom:1px solid var(--border);
  }
  .country-flag { font-size:1.8rem; }
  .country-name { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--dark); }
  .country-count { font-size:0.78rem; color:var(--muted); margin-left:auto; }

  .stations-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:1rem; }

  .station-card {
    background:var(--card); border:1.5px solid var(--border);
    border-radius:14px; padding:1.4rem 1.2rem;
    display:flex; flex-direction:column; gap:0.7rem;
    cursor:pointer; transition:all 0.28s; position:relative;
    outline:none;
  }
  .station-card:hover { border-color:var(--gold); transform:translateY(-3px); box-shadow:0 12px 32px rgba(184,137,46,0.1); }
  .station-card.playing {
    border-color:var(--gold); background:rgba(184,137,46,0.04);
    box-shadow:0 0 0 3px rgba(184,137,46,0.15);
  }
  .station-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:0.5rem; }
  .station-name { font-family:'Playfair Display',serif; font-size:0.95rem; font-weight:700; color:var(--dark); line-height:1.2; }
  .play-btn {
    width:34px; height:34px; border-radius:50%; flex-shrink:0;
    background:var(--gold); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.22s; color:#fff; font-size:0.75rem;
    padding-left:2px;
  }
  .play-btn:hover { background:var(--gold2); transform:scale(1.08); }
  .station-card.playing .play-btn { background:var(--dark); padding-left:0; }
  .station-meta { display:flex; flex-wrap:wrap; gap:0.4rem; }
  .tag {
    display:inline-flex; align-items:center; gap:0.25rem;
    background:rgba(184,137,46,0.08); border:1px solid rgba(184,137,46,0.2);
    color:var(--gold); padding:0.22rem 0.65rem;
    border-radius:20px; font-size:0.68rem; letter-spacing:0.05em;
    text-transform:uppercase; font-weight:500;
  }
  .tag.public { background:rgba(24,24,31,0.05); border-color:rgba(24,24,31,0.12); color:var(--muted); }
  .tag.authorized { background:rgba(67,122,34,0.08); border-color:rgba(67,122,34,0.25); color:#437a22; }
  .station-genre { font-size:0.78rem; color:var(--muted); }

  /* EQUALIZER ANIMATION */
  .eq { display:inline-flex; align-items:flex-end; gap:2px; height:14px; }
  .eq span {
    display:inline-block; width:3px; background:var(--gold2);
    border-radius:2px; animation:eq 0.9s ease-in-out infinite alternate;
  }
  .eq span:nth-child(1) { height:40%; animation-delay:0s; }
  .eq span:nth-child(2) { height:80%; animation-delay:0.15s; }
  .eq span:nth-child(3) { height:55%; animation-delay:0.3s; }
  .eq span:nth-child(4) { height:90%; animation-delay:0.08s; }
  @keyframes eq { from{transform:scaleY(0.4)} to{transform:scaleY(1)} }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:5rem 2rem; color:var(--muted); }
  .empty-state .icon { font-size:3rem; margin-bottom:1rem; opacity:0.4; }
  .empty-state p { font-size:0.95rem; }

  /* STICKY PLAYER */
  .sticky-player {
    position:fixed; bottom:0; left:0; right:0; z-index:200;
    height:var(--player-h);
    background:var(--dark);
    border-top:1px solid rgba(184,137,46,0.3);
    display:flex; align-items:center; gap:1.5rem;
    padding:0 3rem;
    transform:translateY(100%);
    transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);
  }
  .sticky-player.visible { transform:translateY(0); }
  .player-info { display:flex; flex-direction:column; gap:0.2rem; min-width:0; flex:1; }
  .player-station { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .player-country { font-size:0.75rem; color:rgba(255,255,255,0.45); }
  .player-controls { display:flex; align-items:center; gap:1rem; }
  .player-play-btn {
    width:46px; height:46px; border-radius:50%;
    background:var(--gold); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:1rem; transition:all 0.22s;
    padding-left:2px;
  }
  .player-play-btn:hover { background:var(--gold2); }
  .player-play-btn.paused { padding-left:0; }
  .player-stop-btn {
    width:36px; height:36px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,0.6); font-size:0.75rem; transition:all 0.22s;
  }
  .player-stop-btn:hover { background:rgba(255,255,255,0.15); color:#fff; }
  .player-volume { display:flex; align-items:center; gap:0.75rem; }
  .player-vol-icon { color:rgba(255,255,255,0.5); font-size:0.85rem; cursor:pointer; }
  .vol-slider {
    -webkit-appearance:none; appearance:none;
    width:90px; height:3px;
    background:rgba(255,255,255,0.2); border-radius:2px; outline:none;
    cursor:pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:13px; height:13px;
    border-radius:50%; background:var(--gold); cursor:pointer;
  }
  .player-status { display:flex; align-items:center; gap:0.6rem; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:#e74c3c; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .live-label { font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.5); }

  /* FOOTER */
  .page-footer { background:var(--dark); color:rgba(255,255,255,0.4); padding:2rem 3rem; text-align:center; font-size:0.8rem; }
  .page-footer a { color:var(--gold2); text-decoration:none; }

  @media(max-width:900px) { .stats-bar { gap:1.5rem; } }
  @media(max-width:768px) {
    nav { padding:1rem 1.5rem; }
    .nav-link { display:none; }
    .page-header { padding:6rem 1.5rem 2rem; }
    .filters-bar { padding:0.8rem 1.5rem; top:64px; }
    .filters-inner { gap:0.5rem; }
    .search-box { margin-left:0; width:100%; }
    .search-box input { width:100%; }
    .stations-section { padding:1.5rem 1.5rem 4rem; }
    .stats-bar { padding:0 1.5rem; }
    .sticky-player { padding:0 1.5rem; gap:1rem; }
    .player-volume { display:none; }
  }
  @media(max-width:480px) {
    .stations-grid { grid-template-columns:1fr 1fr; }
    .filter-chip { padding:0.32rem 0.7rem; font-size:0.72rem; }
  }
</style>
</head>

<!-- STATS -->
<div class="stats-bar" id="stats-bar">

  <div class="player-controls">

  <div class="player-volume">

    <span class="player-vol-icon">🔊</span>
  </div>
</div>

<div class="page-footer">
  <p>RM Radio API — <a href="index.html">Documentation</a> · <a href="terms.html">Terms</a> · <a href="broadcasters.html">Broadcaster Portal</a></p>
</div>

let currentCountry = "all";
let currentGenre = "all";
let searchQuery = "";
let playingCard = null;
let isPlaying = false;
const audio = document.getElementById("audio-engine");
const player = document.getElementById("sticky-player");
const playerName = document.getElementById("player-name");
const playerCountry = document.getElementById("player-country");
const playerPlayBtn = document.getElementById("player-play-btn");
const playerStopBtn = document.getElementById("player-stop-btn");
const volSlider = document.getElementById("vol-slider");

audio.volume = 0.8;

function getGenres(s) {
  const g = [s.genre];
  if (s.public) g.push("public");
  return g;
}

function renderStations() {
  const container = document.getElementById("stations-container");
  container.innerHTML = "";
  let totalVisible = 0;

  const countryOrder = ["fr","jp","ch","de"];
  countryOrder.forEach(code => {
    if (currentCountry !== "all" && currentCountry !== code) return;
    const group = STATIONS[code];
    const filtered = group.stations.filter(s => {
      if (currentGenre !== "all") {
        const genres = getGenres(s);
        if (!genres.includes(currentGenre)) return false;
      }
      if (searchQuery) {
        return s.name.toLowerCase().includes(searchQuery);
      }
      return true;
    });
    if (!filtered.length) return;
    totalVisible += filtered.length;

    const block = document.createElement("div");
    block.className = "country-block";
    block.innerHTML = \`
      <div class="country-heading">
        <span class="country-flag">\${group.flag}</span>
        <span class="country-name">\${group.name}</span>
        <span class="country-count">\${filtered.length} station\${filtered.length>1?"s":""}</span>
      </div>
      <div class="stations-grid" id="grid-\${code}"></div>
    \`;
    container.appendChild(block);

    const grid = block.querySelector(\`#grid-\${code}\`);
    filtered.forEach(s => {
      const card = document.createElement("div");
      card.className = "station-card";
      card.setAttribute("tabindex","0");
      card.setAttribute("role","button");
      card.setAttribute("aria-label","Play " + s.name);

      const tags = [];
      if (s.public) tags.push(\`<span class="tag public">🏛 Public</span>\`);
      if (s.authorized) tags.push(\`<span class="tag authorized">✓ Authorized</span>\`);
      tags.push(\`<span class="tag">\${s.genre}</span>\`);

      card.innerHTML = \`
        <div class="station-card-top">
          <div class="station-name">\${s.name}</div>
          <button class="play-btn" aria-label="Play \${s.name}">&#9654;</button>
        </div>
        <div class="station-meta">\${tags.join("")}</div>
      \`;

      const playBtn = card.querySelector(".play-btn");

      function playThis() {
        if (playingCard === card && isPlaying) {
          pausePlayer();
          return;
        }
        if (playingCard && playingCard !== card) {
          playingCard.classList.remove("playing");
          const prevBtn = playingCard.querySelector(".play-btn");
          if (prevBtn) { prevBtn.innerHTML = "&#9654;"; prevBtn.style.paddingLeft="2px"; }
        }
        playingCard = card;
        card.classList.add("playing");
        playBtn.innerHTML = \`<div class="eq"><span></span><span></span><span></span><span></span></div>\`;
        playBtn.style.paddingLeft = "0";
        audio.src = s.url;
        audio.play().catch(()=>{});
        isPlaying = true;
        playerName.textContent = s.name;
        playerCountry.textContent = group.flag + " " + group.name;
        player.classList.add("visible");
        playerPlayBtn.innerHTML = "&#9646;&#9646;";
        playerPlayBtn.classList.remove("paused");
      }

      card.addEventListener("click", playThis);
      card.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" ") { e.preventDefault(); playThis(); } });
      playBtn.addEventListener("click", e => { e.stopPropagation(); playThis(); });
      grid.appendChild(card);
    });
  });

  if (!totalVisible) {
    container.innerHTML = \`<div class="empty-state"><div class="icon">📻</div><p>No stations match your filters.</p></div>\`;
  }
  document.getElementById("stat-total").textContent = totalVisible;
}

function pausePlayer() {
  audio.pause();
  isPlaying = false;
  playerPlayBtn.innerHTML = "&#9654;";
  playerPlayBtn.style.paddingLeft = "2px";
  playerPlayBtn.classList.add("paused");
  if (playingCard) {
    const pb = playingCard.querySelector(".play-btn");
    if (pb) { pb.innerHTML = "&#9654;"; pb.style.paddingLeft="2px"; }
  }
}

playerPlayBtn.addEventListener("click", () => {
  if (isPlaying) {
    pausePlayer();
  } else if (audio.src) {
    audio.play().catch(()=>{});
    isPlaying = true;
    playerPlayBtn.innerHTML = "&#9646;&#9646;";
    playerPlayBtn.classList.remove("paused");
    if (playingCard) {
      playingCard.querySelector(".play-btn").innerHTML = \`<div class="eq"><span></span><span></span><span></span><span></span></div>\`;
    }
  }
});

playerStopBtn.addEventListener("click", () => {
  audio.pause();
  audio.src = "";
  isPlaying = false;
  player.classList.remove("visible");
  if (playingCard) {
    playingCard.classList.remove("playing");
    const pb = playingCard.querySelector(".play-btn");
    if (pb) { pb.innerHTML="&#9654;"; pb.style.paddingLeft="2px"; }
    playingCard = null;
  }
});

volSlider.addEventListener("input", () => { audio.volume = volSlider.value; });

document.querySelectorAll(".filter-chip").forEach(btn => {
  btn.addEventListener("click", () => {
    const filterType = btn.dataset.filter;
    const value = btn.dataset.value;
    document.querySelectorAll(\`.filter-chip[data-filter="\${filterType}"]\`).forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    if (filterType === "country") currentCountry = value;
    if (filterType === "genre") currentGenre = value;
    renderStations();
  });
});

document.getElementById("search-input").addEventListener("input", e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderStations();
});

renderStations();
</script>
